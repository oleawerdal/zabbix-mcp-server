#
# Zabbix MCP Server
# Copyright (C) 2026 initMAX s.r.o.
#
# Usage:
#   cp config.example.toml config.toml   # edit with your Zabbix details
#   cp .env.example .env                 # optional: set MCP_HOST, MCP_PORT, MCP_AUTH_TOKEN
#   docker compose up -d                 # start
#   docker compose logs -f               # view logs
#   docker compose down                  # stop
#
# Upgrade:
#   git pull
#   docker compose up -d --build
#
# Port publishing:
#   This base file only EXPOSES the ports to the Docker network; it does not
#   bind them on the host. A plain `docker compose up` automatically also loads
#   docker-compose.override.yml, which publishes the ports on the host so you
#   can reach the server at http://127.0.0.1:8080.
#
#   Platforms with their own reverse proxy (Coolify, Dokploy, etc.) invoke
#   compose with an explicit `-f docker-compose.yml`, which does NOT load the
#   override file. That way the proxy routes to the exposed ports and there is
#   no "port is already allocated" conflict on the host.
#
services:
  zabbix-mcp-server:
    build: .
    container_name: zabbix-mcp-server
    restart: unless-stopped
    # MCP_PORT  - port the server listens on inside the container (default: 8080)
    # ADMIN_PORT - port for the admin web portal (default: 9090)
    # Set these in .env to override without editing this file.
    command: ["--config", "/etc/zabbix-mcp/config.toml", "--host", "0.0.0.0", "--port", "${MCP_PORT:-8080}"]
    # expose makes the ports reachable inside the Docker network / to a reverse
    # proxy, without binding them on the host. Host publishing lives in
    # docker-compose.override.yml (loaded automatically by `docker compose up`).
    expose:
      - "${MCP_PORT:-8080}"
      - "${ADMIN_PORT:-9090}"
    env_file:
      - path: .env
        required: false
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - ADMIN_PORT=${ADMIN_PORT:-9090}
    volumes:
      - ./config.toml:/etc/zabbix-mcp/config.toml
      - assets:/etc/zabbix-mcp/assets
      - tls:/etc/zabbix-mcp/tls
      - templates:/etc/zabbix-mcp/templates
      - logs:/var/log/zabbix-mcp
    healthcheck:
      test: ["CMD", "/opt/zabbix-mcp/venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${MCP_PORT:-8080}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  assets:
  tls:
  templates:
  logs:
