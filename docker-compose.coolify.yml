# Zabbix MCP Server — Coolify deployment
# Copyright (C) 2026 initMAX s.r.o.
#
# Tailored for Coolify (and other PaaS that put a reverse proxy in front of
# your containers). Point your Coolify "Docker Compose" resource at this file.
#
# Two things make this Coolify-friendly:
#
#  1) Ports: uses `expose:` instead of `ports:` so the Coolify proxy routes to
#     the container without binding 8080/9090 on the host (which collides with
#     the proxy -> "Bind for 0.0.0.0:8080 failed: port is already allocated").
#     Coolify wires up domains via the SERVICE_FQDN_* variables below.
#
#  2) Config: the server needs /etc/zabbix-mcp/config.toml. Instead of
#     bind-mounting a host file (which does not exist in the build context on
#     Coolify, so Docker creates a DIRECTORY there -> "Is a directory" error),
#     we keep the whole /etc/zabbix-mcp tree on a named volume. On first start
#     the image seeds a default config into it (see docker/entrypoint.sh), the
#     server boots, and the admin portal auto-creates an "admin" user whose
#     random password is printed in the container logs (WARNING level).
#
# First-run steps on Coolify:
#   1. Deploy. Watch the logs for: "Generated admin password: ...".
#   2. Open the admin portal (the domain Coolify created for port 9090) and
#      log in as admin with that password. Change it.
#   3. Go to Servers and point it at your real Zabbix (url + API token).
#   4. The config persists on the named volume across redeploys.
#

services:
  zabbix-mcp-server:
    build: .
    container_name: zabbix-mcp-server
    restart: unless-stopped
    # SERVICE_FQDN_* are Coolify "magic" variables. Coolify generates a domain
    # for each and points the proxy at the matching exposed port. MCP API is on
    # 8080, the admin portal on 9090.
    environment:
      - SERVICE_FQDN_ZABBIXMCP_8080
      - SERVICE_FQDN_ZABBIXADMIN_9090
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
    command: ["--config", "/etc/zabbix-mcp/config.toml", "--host", "0.0.0.0", "--port", "8080"]
    # expose (not ports): reachable by the Coolify proxy, not bound on the host.
    expose:
      - "8080"
      - "9090"
    # Whole config tree on a named volume: persistent + writable by the
    # container user, so the admin portal can save changes and the default
    # config can be seeded on first run.
    volumes:
      - config:/etc/zabbix-mcp
    healthcheck:
      test: ["CMD", "/opt/zabbix-mcp/venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  config:
